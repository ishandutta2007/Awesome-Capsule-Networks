<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a23" />
      <stop offset="100%" stop-color="#1b1b3a" />
    </linearGradient>

    <!-- Glowing Vector Gradients -->
    <linearGradient id="glowGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Animation for Gradient Shifting -->
    <linearGradient id="animatedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff">
        <animate attributeName="stop-color" values="#7f00ff;#00f0ff;#ff007f;#7f00ff" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ff007f">
        <animate attributeName="stop-color" values="#ff007f;#7f00ff;#00f0ff;#ff007f" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="15" />

  <!-- Dynamic Cyber Grid (Subtle Lines) -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.1">
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
    <line x1="800" y1="0" x2="800" y2="400" />
    <line x1="900" y1="0" x2="900" y2="400" />
    <line x1="1000" y1="0" x2="1000" y2="400" />
    <line x1="1100" y1="0" x2="1100" y2="400" />
    
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
  </g>

  <!-- Abstract Animated Floating Particles (Capsules representation) -->
  <g filter="url(#glow)">
    <!-- Rotating & pulsing capsule representation -->
    <rect x="950" y="80" width="80" height="240" rx="40" fill="none" stroke="url(#animatedGrad)" stroke-width="4">
      <animateTransform attributeName="transform" type="rotate" from="0 990 200" to="360 990 200" dur="20s" repeatCount="indefinite" />
    </rect>
    <rect x="975" y="130" width="30" height="140" rx="15" fill="url(#animatedGrad)" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 990 200" to="0 990 200" dur="15s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Network Connections (Lines with dash animation) -->
  <g stroke="url(#glowGrad1)" stroke-width="2" filter="url(#glow)">
    <path d="M 100,200 L 300,100 L 500,250 L 700,150 L 900,200" fill="none">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0;0,1000" dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M 100,200 L 300,300 L 500,250 L 700,250" fill="none" opacity="0.5" />
  </g>

  <!-- Title & Subtitle -->
  <text x="120" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="2">
    AWESOME CAPSULE NETWORKS
  </text>
  <text x="125" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#00f0ff" letter-spacing="4">
    EVOLUTION, VARIANTS, TYPES &amp; APPLICATIONS
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
  </text>

  <!-- Small Glowing Node Points -->
  <g fill="#00f0ff" filter="url(#glow)">
    <circle cx="100" cy="200" r="6"><animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite" /></circle>
    <circle cx="300" cy="100" r="5" />
    <circle cx="500" cy="250" r="7"><animate attributeName="r" values="7;4;7" dur="2.5s" repeatCount="indefinite" /></circle>
    <circle cx="700" cy="150" r="5" />
    <circle cx="900" cy="200" r="6" />
  </g>
</svg>
